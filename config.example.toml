# Copy this file to `config.toml` and fill in your values.
# `config.toml` is gitignored (it holds your Granola token).

[vault]
# Absolute path to your Obsidian vault.
path = "/Users/jonathang/Documents/Obsidian Vault"
# Vault name as Obsidian knows it (used for obsidian:// deep links).
name = "Obsidian Vault"
# Folder (relative to the vault) where insight notes are written.
insights_folder = "Transcript Insights"

[pocket]
# Folder (relative to the vault) that Pocket writes recordings into (fallback source,
# used only when api_key below is empty).
folder = "Pocket AI Recordings"
# Pocket API key (starts with pk_) from heypocket.com -> Settings -> Developer -> API Keys.
# When set, transcripts are pulled from the Pocket API instead of the folder.
api_key = ""
api_base = "https://public.heypocketai.com/api/v1"
# Download each recording's audio into the vault (Transcript Insights/Attachments/) during sync,
# and embed a player in the note. Set false to keep transcripts only. (Granola has no audio API.)
download_audio = true

[granola]
# Paste your Granola API key (starts with grn_) to enable Granola sync.
# Create one in the Granola desktop app (Business plan). Leave empty to skip Granola.
token = ""
api_base = "https://public-api.granola.ai/v1"

[ollama]
host = "http://localhost:11434"
# Chat model for insights + Q&A. `ollama pull qwen2.5:7b-instruct` recommended.
# qwen2.5:3b works too but mis-categorizes more often.
chat_model = "qwen2.5:7b-instruct"
embed_model = "nomic-embed-text"
# Request timeout (seconds) for a single LLM call.
timeout = 600

[sync]
# How often the launchd agent runs, in seconds (used by install_launchd.sh).
interval_seconds = 1200

[taxonomy]
# Seed categories. New ones are added automatically as transcripts arrive.
seed = ["Fundraising", "Product", "Engineering", "Hiring", "Sales", "Research", "Personal", "Operations"]
# Cosine-similarity threshold above which a proposed new category is merged
# into an existing one instead of created.
merge_threshold = 0.82

[web]
host = "127.0.0.1"
port = 8787
